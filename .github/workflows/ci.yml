name: CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "src/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          JARVIS_LLM_PROVIDER: openai
          JARVIS_KAFKA_ENABLED: "false"
        run: |
          PYTHONPATH=src python -m pytest tests/test_api.py -v

      - name: Verify server starts
        env:
          JARVIS_API_KEY: ci-test-key
          JARVIS_LLM_PROVIDER: openai
          JARVIS_KAFKA_ENABLED: "false"
        run: |
          PYTHONPATH=src python -m uvicorn jarvis.main:app --host 0.0.0.0 --port 8765 &
          SERVER_PID=$!
          sleep 5
          curl -f http://localhost:8765/health || (kill $SERVER_PID && exit 1)
          curl -f http://localhost:8765/ || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID
          echo "Server started and health check passed!"
