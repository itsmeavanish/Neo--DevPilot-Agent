#=========================================================
# JARVIS Full Stack - Docker Compose
#=========================================================
# Start all services: docker-compose up -d
# Start specific:     docker-compose up -d jarvis
# View logs:          docker-compose logs -f jarvis
# Stop all:           docker-compose down

services:
  # ═══════════════════════════════════════════════════
  # JARVIS API Server
  # ═══════════════════════════════════════════════════
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-api
    environment:
      - JARVIS_API_HOST=0.0.0.0
      - JARVIS_API_PORT=8000
      - JARVIS_DEBUG=false
      - JARVIS_REDIS_URL=redis://redis:6379
      - JARVIS_DATABASE_URL=postgresql://jarvis:jarvis_secret@postgres:5432/jarvis
      - JARVIS_LLM_PROVIDER=copilot
      - JARVIS_OLLAMA_HOST=http://host.docker.internal:11434
      - JARVIS_COPILOT_TIMEOUT=120
      - JARVIS_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-network

  # ═══════════════════════════════════════════════════
  # PostgreSQL with pgvector for semantic memory
  # ═══════════════════════════════════════════════════
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis_secret
      POSTGRES_DB: jarvis
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jarvis-network

  # ═══════════════════════════════════════════════════
  # Redis for short-term memory / caching
  # ═══════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jarvis-network

  # ═══════════════════════════════════════════════════
  # Apache Kafka for event streaming
  # ═══════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: jarvis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jarvis-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: jarvis-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - jarvis-network

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  jarvis-network:
    driver: bridge
