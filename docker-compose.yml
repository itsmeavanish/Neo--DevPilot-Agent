# JARVIS - Simple Docker Setup
# Start: docker-compose up -d
# Stop:  docker-compose down

services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis
    ports:
      - "8000:8000"
    environment:
      - JARVIS_API_HOST=0.0.0.0
      - JARVIS_API_PORT=8000
      - JARVIS_DEBUG=false
      - JARVIS_LLM_PROVIDER=ollama
      - JARVIS_OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
