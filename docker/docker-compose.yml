#=========================================================
# JARVIS Infrastructure - Docker Compose
#=========================================================
# Start with: docker-compose -f docker/docker-compose.yml up -d

services:
  # ═══════════════════════════════════════════════════
  # PostgreSQL with pgvector for semantic memory
  # ═══════════════════════════════════════════════════
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis_secret
      POSTGRES_DB: jarvis
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════════
  # Redis for short-term memory / caching
  # ═══════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════════
  # Ollama for local LLM/Embeddings (optional)
  # Note: Ollama runs better natively on Windows
  # ═══════════════════════════════════════════════════
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: jarvis-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # GPU support (uncomment for NVIDIA)
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  # ollama_data:

networks:
  default:
    name: jarvis-network
